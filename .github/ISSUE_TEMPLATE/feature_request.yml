name: Feature request
description: Suggest a new capability or enhancement for retlang.
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping shape retlang. Please describe the problem first,
        then your proposed solution. Concrete use cases help a lot.

  - type: textarea
    id: problem
    attributes:
      label: Problem description
      description: What are you trying to accomplish, and what is blocking you today?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like this to work? API sketches, CLI flags, or UI mocks welcome.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why you ruled them out.
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, related issues, environments, or anything else relevant.
    validations:
      required: false
