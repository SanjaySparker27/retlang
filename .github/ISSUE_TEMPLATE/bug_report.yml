name: Bug report
description: Report a defect or unexpected behavior in retlang.
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report.

        > **PII warning:** Do **not** paste real passphrases, private keys, or any
        > other secret material into this issue. If you must share a failing input,
        > substitute a dummy passphrase that reproduces the same behavior.

  - type: input
    id: retlang-version
    attributes:
      label: retlang version
      description: Output of `python -c "import retlang; print(retlang.__version__)"`
      placeholder: "0.2.0"
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python version
      description: Output of `python --version`
      placeholder: "3.12.4"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux
        - macOS
        - Windows
        - Other (specify in "What happened")
    validations:
      required: true

  - type: textarea
    id: what-you-did
    attributes:
      label: What did you do?
      description: Minimal reproduction. Commands, code snippet, or CLI invocation.
      render: shell
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: What actually happened?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / traceback
      description: Paste any relevant error output. Scrub secrets before submitting.
      render: shell
    validations:
      required: false
