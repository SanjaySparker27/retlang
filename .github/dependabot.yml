version: 2
updates:
  # Keep GitHub Actions pinned versions fresh.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"

  # Python dependencies declared in pyproject.toml. The core package has no
  # runtime deps, so in practice this watches optional + dev extras (qr, ruff,
  # mypy, build). Ignore major bumps to keep noise down; minor/patch land
  # automatically and still require CI to pass.
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "python"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
